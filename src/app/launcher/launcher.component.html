<button
  #launcher
  id="bbc-launcher"
  [attr.aria-expanded]="!wrapper?.hidden ? 'true' : 'false'"
  [attr.aria-hidden]="uiReady ? 'false' : 'true'"
  style="position:fixed; right:var(--bbc-side-offset); bottom:var(--bbc-side-offset); z-index:calc(var(--bbc-z) + 1);
         width:var(--bbc-launcher-size); height:var(--bbc-launcher-size); border-radius:50%;
         border:0; padding:0; margin:0; overflow:hidden;
         background:transparent; box-shadow:0 8px 28px rgba(0,0,0,.16); cursor:pointer;">

  <ng-container *ngIf="videoEnabled && computedLauncherVideoSrc; else imgTpl">
    <video
      #launcherVideo
      [src]="computedLauncherVideoSrc"
      preload="auto"
      playsinline
      webkit-playsinline
      muted
      [attr.autoplay]="isIOSDevice ? '' : null"
      style="display:block; width:100%; height:100%; object-fit:cover; pointer-events:none;"
    ></video>
  </ng-container>

  <ng-template #imgTpl>
    <img
      [src]="computedRobot"
      alt=""
      aria-hidden="true"
      draggable="false"
      loading="eager"
      decoding="async"
      (error)="onLauncherImgError()"
      style="display:block; width:100%; height:100%; object-fit:contain; object-position:center; pointer-events:none; -webkit-user-drag:none; user-drag:none;" />
  </ng-template>
</button>

<div
  #wrapper
  id="bbc-wrapper"
  hidden
  [attr.aria-hidden]="uiReady ? null : 'true'"
  style="position:fixed; right:var(--bbc-side-offset); bottom:var(--bbc-side-offset);
         width:var(--bbc-compact-width); height:var(--bbc-compact-height); z-index:var(--bbc-z);">
  <blue-search
    #chat
    id="bbc-chat"
    [mode]="panelMode"
    [title]="title || 'Assistant'"
    [welcomeText]="welcometext || ''"
    [logoSrc]="computedLogo"
    [logoAlt]="logoalt"
    [appid]="appid"
    [env]="env"
    [persist]="persist"
    [userid]="userid"
    [gptid]="gptid"
    [assistandid]="assistandid"
    [lang]="lang"
    [defaultLang]="defaultLang"
    [translations]="translations"
    [roleLabels]="parsedRoleLabels"
    [roleAvatars]="parsedRoleAvatars"
    [roleAvatarImages]="parsedRoleAvatarImages"
    [roleAvatarBg]="parsedRoleAvatarBg"
    [headerLogoBg]="headerlogobg"
    [headerLogoRound]="headerLogoRoundCoerced"
    [headerLogoInitial]="headerLogoInitialCoerced"
    [username]="username"
    [fontFamily]="fontFamilyEffective"
    [fontSize]="fontSizeEffective"
    [lineHeight]="lineHeightEffective"
    [feedbackEnabled]="feedbackEnabledEffective"
    [storageKey]="historyStorageKey">
  </blue-search>
</div>
